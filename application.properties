# ===== SDG Roadmap Application Configuration =====

# Server port
server.port=8080

# App name
spring.application.name=sdg-roadmap

# Serve static files from src/main/resources/static/
# Place your frontend files (index.html, style.css, app.js) in that folder
# Spring Boot will serve them automatically at http://localhost:8080/

# Logging
logging.level.com.sdg=DEBUG
