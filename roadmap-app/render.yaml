services:
  - type: web
    name: roadmap-app
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/roadmap-app-0.0.1-SNAPSHOT.jar
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 8080
    healthCheckPath: /
