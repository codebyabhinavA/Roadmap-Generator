<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadMap — Turn Goals Into Action</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1A1A1A;
      --ink-muted: #6B6B6B;
      --ink-light: #A0A0A0;
      --bg: #F9F7F4;
      --bg-card: #FFFFFF;
      --accent: #2D6A4F;
      --accent-light: #D8EDE3;
      --border: #E0DDD8;
      --danger: #C0392B;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .screen {
      width: 100%;
      max-width: 640px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ── */
    .display {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: var(--ink-muted);
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    h2 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    p { color: var(--ink-muted); font-size: 0.95rem; }

    /* ── Inputs ── */
    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      font-family: var(--sans);
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 80px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.75rem;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: #235440; }
    .btn-primary:disabled { background: #A8C9BB; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--ink-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--border); color: var(--ink); }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 2rem;
    }

    .progress-label {
      font-size: 0.8rem;
      color: var(--ink-light);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── Loading ── */
    .loading-screen {
      text-align: center;
      padding: 3rem 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen h2 { margin-bottom: 0.5rem; }

    /* ── Roadmap ── */
    .roadmap-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .roadmap-title {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 0.75rem;
    }

    .roadmap-summary {
      font-size: 0.95rem;
      color: var(--ink-muted);
      line-height: 1.7;
    }

    .sdg-badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.3rem 0.85rem;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    /* ── Phase timeline ── */
    .timeline {
      position: relative;
      padding-left: 2.5rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 20px;
      bottom: 20px;
      width: 1px;
      background: var(--border);
    }

    .phase {
      position: relative;
      margin-bottom: 2rem;
    }

    .phase-dot {
      position: absolute;
      left: -2.5rem;
      top: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    .phase-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .phase-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }

    .phase-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 600;
    }

    .phase-duration {
      font-size: 0.78rem;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.2rem 0.65rem;
      border-radius: 99px;
      white-space: nowrap;
      font-weight: 500;
    }

    .phase-objective {
      font-size: 0.875rem;
      color: var(--ink-muted);
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      font-size: 0.875rem;
      color: var(--ink);
      line-height: 1.5;
    }

    .step-num {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--ink-muted);
      margin-top: 1px;
    }

    /* ── Error ── */
    .error-msg {
      background: #FDECEA;
      border: 1px solid #F5C6C2;
      color: var(--danger);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .footer-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .timeline { padding-left: 2rem; }
      .phase-dot { left: -2rem; width: 24px; height: 24px; font-size: 0.65rem; }
      .timeline::before { left: 11px; }
    }

    /* ── Print ── */
    @media print {
      .btn, .footer-actions { display: none; }
      .phase-card { break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- ══ SCREEN 1: GOAL INPUT ══ -->
  <div class="screen" id="screen-goal">
    <div class="display">What's your goal?</div>
    <p class="tagline">Turn your dream into a clear, step-by-step path forward.</p>
    <div class="input-wrap">
      <input type="text" id="goal-input" placeholder="e.g. Become a software engineer, Launch my own business…" maxlength="300" />
      <div id="goal-error" class="error-msg"></div>
      <div>
        <button class="btn btn-primary" id="goal-btn" onclick="submitGoal()">
          Begin &rarr;
        </button>
      </div>
    </div>
  </div>

  <!-- ══ SCREEN 2: QUESTIONS ══ -->
  <div class="screen" id="screen-questions" style="display:none">
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">Question 1 of 5</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:20%"></div>
      </div>
    </div>
    <h2 id="question-text"></h2>
    <p style="margin-bottom:1.5rem; margin-top:0.3rem; font-size:0.85rem;">Take your time — the more specific, the better your roadmap.</p>
    <textarea id="answer-input" placeholder="Your answer…" rows="3"></textarea>
    <div id="answer-error" class="error-msg"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Next &rarr;</button>
      <button class="btn btn-ghost" onclick="goBack()">&#8592; Back</button>
    </div>
  </div>

  <!-- ══ SCREEN 3: LOADING ══ -->
  <div class="screen loading-screen" id="screen-loading" style="display:none">
    <div class="spinner"></div>
    <h2>Building your roadmap…</h2>
    <p>Claude AI is crafting a personalised plan just for you.</p>
  </div>

  <!-- ══ SCREEN 4: ROADMAP ══ -->
  <div class="screen" id="screen-roadmap" style="display:none">
    <div class="roadmap-header">
      <div class="roadmap-title" id="roadmap-title"></div>
      <div class="roadmap-summary" id="roadmap-summary"></div>
      <span class="sdg-badge">SDG 17 · Partnership for Goals</span>
    </div>
    <div class="timeline" id="phases-container"></div>
    <div class="footer">
      <div class="footer-actions">
        <button class="btn btn-ghost" onclick="printRoadmap()">&#128438; Save as PDF</button>
        <button class="btn btn-ghost" onclick="startOver()">&#8635; Start Over</button>
      </div>
    </div>
  </div>

</div>

<script>
  let state = {
    goal: '',
    questions: [],
    answers: [],
    currentQ: 0
  };

  function showScreen(id) {
    ['screen-goal','screen-questions','screen-loading','screen-roadmap']
      .forEach(s => document.getElementById(s).style.display = 'none');
    const el = document.getElementById(id);
    el.style.display = '';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function submitGoal() {
    const input = document.getElementById('goal-input').value.trim();
    hideError('goal-error');
    if (!input) { showError('goal-error', 'Please enter your goal before continuing.'); return; }

    state.goal = input;
    const btn = document.getElementById('goal-btn');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    try {
      const res = await fetch('/api/questions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal: input })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');

      state.questions = data.questions;
      state.answers = [];
      state.currentQ = 0;
      renderQuestion();
      showScreen('screen-questions');
    } catch (e) {
      showError('goal-error', e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Begin →';
    }
  }

  function renderQuestion() {
    const q = state.questions[state.currentQ];
    const total = state.questions.length;
    const n = state.currentQ + 1;
    document.getElementById('question-text').textContent = q;
    document.getElementById('progress-label').textContent = `Question ${n} of ${total}`;
    document.getElementById('progress-fill').style.width = `${(n / total) * 100}%`;
    const saved = state.answers[state.currentQ];
    document.getElementById('answer-input').value = saved ? saved.answer : '';
    hideError('answer-error');
    const isLast = state.currentQ === total - 1;
    document.getElementById('next-btn').textContent = isLast ? 'Build My Roadmap →' : 'Next →';
  }

  function nextQuestion() {
    const answer = document.getElementById('answer-input').value.trim();
    hideError('answer-error');
    if (!answer) { showError('answer-error', 'Please answer this question to continue.'); return; }

    state.answers[state.currentQ] = {
      question: state.questions[state.currentQ],
      answer: answer
    };

    if (state.currentQ < state.questions.length - 1) {
      state.currentQ++;
      renderQuestion();
    } else {
      generateRoadmap();
    }
  }

  function goBack() {
    const answer = document.getElementById('answer-input').value.trim();
    if (answer) state.answers[state.currentQ] = { question: state.questions[state.currentQ], answer };

    if (state.currentQ > 0) {
      state.currentQ--;
      renderQuestion();
    } else {
      showScreen('screen-goal');
    }
  }

  async function generateRoadmap() {
    showScreen('screen-loading');
    try {
      const res = await fetch('/api/roadmap', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal: state.goal, answers: state.answers })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to generate roadmap.');
      renderRoadmap(data);
      showScreen('screen-roadmap');
    } catch (e) {
      showScreen('screen-questions');
      showError('answer-error', 'Error: ' + e.message + ' — please try again.');
    }
  }

  function renderRoadmap(data) {
    document.getElementById('roadmap-title').textContent = data.title;
    document.getElementById('roadmap-summary').textContent = data.summary;

    const container = document.getElementById('phases-container');
    container.innerHTML = '';

    data.phases.forEach(phase => {
      const steps = phase.actionSteps.map((step, i) => `
        <li class="step-item">
          <span class="step-num">${i + 1}</span>
          <span>${step}</span>
        </li>`).join('');

      container.innerHTML += `
        <div class="phase">
          <div class="phase-dot">${phase.number}</div>
          <div class="phase-card">
            <div class="phase-header">
              <span class="phase-title">${phase.title}</span>
              <span class="phase-duration">${phase.duration}</span>
            </div>
            <p class="phase-objective">${phase.objective}</p>
            <ul class="steps-list">${steps}</ul>
          </div>
        </div>`;
    });
  }

  function startOver() {
    state = { goal: '', questions: [], answers: [], currentQ: 0 };
    document.getElementById('goal-input').value = '';
    showScreen('screen-goal');
  }

  function printRoadmap() { window.print(); }

  document.getElementById('goal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitGoal();
  });

  document.getElementById('answer-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); nextQuestion(); }
  });
</script>
</body>
</html>
